name: Release Please

on:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_PLEASE_PAT }}

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    # The "pypi" environment must be registered as a trusted publisher on PyPI
    environment: pypi
    permissions:
      contents: write # upload assets to the GitHub release
      id-token: write # PyPI trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0

      - name: Install dependencies
        run: uv sync --locked

      - name: Lint with ruff
        run: uv run ruff check

      - name: Type-check with mypy
        run: uv run mypy

      - name: Run tests
        run: uv run pytest

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        run: uv publish

      - name: Upload distributions to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ needs.release-please.outputs.tag_name }} dist/*
