site_name: ghfanout
site_description: Distribute shared configuration files to multiple GitHub repositories as pull requests
site_url: https://seiya-koji.github.io/ghfanout/
repo_url: https://github.com/seiya-koji/ghfanout
repo_name: seiya-koji/ghfanout

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.top
    - content.code.copy

markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Templates: templates.md
  - Authentication: authentication.md
  - CLI Reference: cli.md
  - Development: development.md
